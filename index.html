<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/css/index.css">
  <title>TEMPO APP</title>
</head>
<body>
  <div class="containerButton">
    <button type="button" class="locais">
      Locais
    </button>
  </div>
  <div class="containerTemp">
    <div class="containerCard">
      <div class="contentAtual">
        <h1 class="cidade"></h1>
        <img src="" alt="Atual" class="imgAtual">
        <p class="celsius"></p>
        <p class="condicaoAtual"></p>
        <div class="contentMaxMin">
          <p>Min: <span class="min"></span></p>
          <p>Max: <span class="max"></span></p>
        </div>
      </div>
    </div>
  </div>
  <div class="containerHoje">
    <div class="containerCardHoje">
      <h2>HOJE</h2>
      <hr>
      <div class="contentHora">
        <h5 class="manha"></h5>
        <img src="" alt="Manha" class="imgManha">
        <p class="tempManha"></p>
      </div>
      <hr>
      <div class="contentHora">
        <h5 class="tarde"></h5>
        <img src="" alt="Tarde" class="imgTarde">
        <p class="tempTarde"></p>
      </div>
      <hr>
      <div class="contentHora">
        <h5 class="noite"></h5>
        <img src="" alt="Noite" class="imgNoite">
        <p class="tempNoite"></p>
      </div>
    </div>
  </div>
  <script src="./assets/js/index.js"></script>
</body>
</html>
